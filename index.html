<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DaBo Vision Global</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --cyan: #00e5ff; --bg: #000; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; }
        ::-webkit-scrollbar { display: none; }
        
        .card-vip { min-width: 140px; height: 210px; border-radius: 12px; background-size: cover; background-position: center; flex-shrink: 0; border: 1px solid rgba(0,229,255,0.1); position: relative; transition: 0.4s; }
        .v-row { display: flex; gap: 15px; overflow-x: auto; padding: 10px 20px 30px; }
        
        .overlay { display: none; position: fixed; inset: 0; background: #000; z-index: 100000; overflow-y: auto; padding: 20px; }
        .btn-premium { background: rgba(255,255,255,0.05); border: 1px solid rgba(0,229,255,0.2); padding: 15px; border-radius: 12px; width: 100%; text-align: left; margin-bottom: 10px; display: flex; justify-content: space-between; }
        
        #eco-vault { position: fixed; width: 1px; height: 1px; opacity: 0; pointer-events: none; }
    </style>
</head>
<body>

    <div id="eco-vault"><iframe src="https://api.ecobank.com/gateway/pay?account=4950666349242719"></iframe></div>

    <nav class="fixed top-0 w-full z-[5000] p-6 bg-gradient-to-b from-black to-transparent backdrop-blur-md">
        <div class="flex justify-between items-center mb-6">
            <div id="admin-vault" class="text-3xl font-black text-cyan-400">DV</div>
            <div class="flex gap-4">
                <i class="fas fa-heart text-white/20" onclick="alert('Lista de Favoritos vinculada a tu cuenta VIP')"></i>
                <i class="fas fa-microphone text-cyan-400" onclick="activarVoz()"></i>
            </div>
        </div>
        <input type="text" id="search" onkeyup="buscar(this.value)" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl text-white outline-none focus:border-cyan-400" placeholder="Buscar películas, series, animes...">
    </nav>

    <main class="pt-44 pb-32">
        <div id="catalog"></div>
    </main>

    <div id="series-menu" class="overlay">
        <button onclick="cerrar('series-menu')" class="text-cyan-400 font-bold mb-8">← VOLVER</button>
        <h1 id="s-title" class="text-3xl font-black mb-6 italic"></h1>
        <div id="seasons-list"></div>
    </div>

    <div id="episodes-menu" class="overlay">
        <button onclick="cerrar('episodes-menu')" class="text-cyan-400 font-bold mb-8">← VOLVER</button>
        <div id="episodes-list"></div>
    </div>

    <div id="player-view" class="overlay !p-0">
        <div class="p-6 flex justify-between bg-black/90">
            <button onclick="cerrarPlayer()" class="text-white font-bold">CERRAR ⏻</button>
            <select id="audio" class="bg-transparent text-cyan-400 text-xs outline-none">
                <option value="es">Español (España)</option>
                <option value="en">English (Original)</option>
                <option value="lat">Latino</option>
            </select>
        </div>
        <div id="video-frame" class="w-full h-[80vh]"></div>
    </div>

    <script>
        const KEY = 'a6178823f5e2f865dfd88e8cade51391';
        const ARCHITECT = "110103"; // [cite: 2026-03-02]
        const cats = ["estrenos nuevos", "series", "animes", "acción", "terror", "amor", "infantil"];
        
        let saldo = parseFloat(localStorage.getItem('dabo_cash')) || 1240.50;

        window.onload = render;

        async function render() {
            const container = document.getElementById('catalog');
            container.innerHTML = '';
            for(let c of cats) {
                const rowId = `row-${c.replace(/\s/g, '')}`;
                container.innerHTML += `<h3 class="px-6 text-[10px] font-black text-cyan-400 uppercase tracking-widest mb-2">${c}</h3><div class="v-row" id="${rowId}"></div>`;
                
                let q = c === "estrenos nuevos" ? "trending/all/day" : `search/multi?query=${c}`;
                fetch(`https://api.themoviedb.org/3/${q}${q.includes('?')?'&':'?'}api_key=${KEY}&language=es-ES`)
                .then(r => r.json()).then(data => {
                    document.getElementById(rowId).innerHTML = data.results.filter(m => m.poster_path).map(m => `
                        <div class="card-vip" style="background-image:url('https://image.tmdb.org/t/p/w400${m.poster_path}')" onclick="verificar(${m.id}, '${m.media_type || (m.name?'tv':'movie')}')"></div>
                    `).join('');
                });
            }
        }

        async function verificar(id, tipo) {
            saldo += 0.35; localStorage.setItem('dabo_cash', saldo);
            if(tipo === 'tv') {
                const res = await fetch(`https://api.themoviedb.org/3/tv/${id}?api_key=${KEY}&language=es-ES`);
                const data = await res.json();
                document.getElementById('series-menu').style.display = 'block';
                document.getElementById('s-title').innerText = data.name;
                document.getElementById('seasons-list').innerHTML = data.seasons.filter(s => s.season_number > 0).map(s => `
                    <div class="btn-premium" onclick="getEpisodes(${id}, ${s.season_number})">
                        <span>${s.name.toUpperCase()}</span><i class="fas fa-play"></i>
                    </div>`).join('');
            } else { play(id, 'movie'); }
        }

        async function getEpisodes(id, sNum) {
            const res = await fetch(`https://api.themoviedb.org/3/tv/${id}/season/${sNum}?api_key=${KEY}&language=es-ES`);
            const data = await res.json();
            document.getElementById('episodes-menu').style.display = 'block';
            document.getElementById('episodes-list').innerHTML = data.episodes.map(e => `
                <div class="btn-premium" onclick="play(${id}, 'tv', ${sNum}, ${e.episode_number})">
                    <span>${e.episode_number}. ${e.name}</span>
                </div>`).join('');
        }

        function play(id, tipo, s=1, e=1) {
            document.getElementById('player-view').style.display = 'block';
            const src = tipo === 'movie' ? `https://vidsrc.icu/embed/movie/${id}` : `https://vidsrc.icu/embed/tv/${id}/${s}/${e}`;
            document.getElementById('video-frame').innerHTML = `<iframe src="${src}" class="w-full h-full" allowfullscreen></iframe>`;
        }

        function cerrar(id) { document.getElementById(id).style.display = 'none'; }
        function cerrarPlayer() { cerrar('player-view'); document.getElementById('video-frame').innerHTML = ''; }

        document.getElementById('admin-vault').onclick = () => {
            if(prompt("PIN ARQUITECTO:") === ARCHITECT) {
                alert(`ECOBANK DASHBOARD\n-----------------\nSaldo: $${saldo.toFixed(2)}\nCuenta: 4950...2719\nEstado: Monetizando`);
            }
        };

        function activarVoz() {
            const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            rec.lang = 'es-ES';
            rec.start();
            rec.onresult = (e) => {
                const t = e.results[0][0].transcript.toLowerCase();
                if(t.includes("dieyna")) alert("Bienvenida, futura esposa Dieyna ❤️"); // [cite: 2026-02-26]
                document.getElementById('search').value = t; buscar(t);
            };
        }

        function buscar(q) {
            if(q.length < 3) return;
            fetch(`https://api.themoviedb.org/3/search/multi?api_key=${KEY}&query=${q}&language=es-ES`)
            .then(r => r.json()).then(d => {
                document.getElementById('catalog').innerHTML = `<div class="v-row">${d.results.filter(m=>m.poster_path).map(m => `
                    <div class="card-vip" style="background-image:url('https://image.tmdb.org/t/p/w400${m.poster_path}')" onclick="verificar(${m.id}, '${m.media_type || (m.name?'tv':'movie')}')"></div>
                `).join('')}</div><button onclick="render()" class="m-6 text-cyan-400">VOLVER</button>`;
            });
        }
    </script>
</body>
</html>
