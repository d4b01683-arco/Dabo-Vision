<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DaBo Vision Global</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div id="eco-vault"><iframe src="https://api.ecobank.com/gateway/pay?account=4950666349242719"></iframe></div>

    <nav class="fixed top-0 w-full z-[5000] p-6 bg-gradient-to-b from-black to-transparent backdrop-blur-md">
        <div class="flex justify-between items-center mb-6">
            <div id="admin-vault" class="text-3xl font-black text-cyan-400">DV</div>
            <div class="flex gap-4">
                <i class="fas fa-heart text-white/20" onclick="alert('Lista de Favoritos VIP')"></i>
                <i class="fas fa-microphone text-cyan-400" onclick="activarVoz()"></i>
            </div>
        </div>
        <input type="text" id="search" onkeyup="buscar(this.value)" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl text-white outline-none focus:border-cyan-400" placeholder="Buscar películas, series, animes...">
    </nav>

    <main class="pt-44 pb-32">
        <div id="catalog"></div>
    </main>

    <div id="series-menu" class="overlay">
        <button onclick="cerrar('series-menu')" class="text-cyan-400 font-bold mb-8">← VOLVER</button>
        <h1 id="s-title" class="text-3xl font-black mb-6 italic"></h1>
        <div id="seasons-list"></div>
    </div>

    <div id="episodes-menu" class="overlay">
        <button onclick="cerrar('episodes-menu')" class="text-cyan-400 font-bold mb-8">← VOLVER</button>
        <div id="episodes-list"></div>
    </div>

    <div id="player-view" class="overlay !p-0">
        <div class="p-6 flex justify-between bg-black/90">
            <button onclick="cerrarPlayer()" class="text-white font-bold text-xs">CERRAR ⏻</button>
            <div class="text-cyan-400 text-[10px] font-bold">SERVIDOR SEGURO ACTIVO</div>
        </div>
        <div id="video-frame" class="w-full h-[80vh]"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
